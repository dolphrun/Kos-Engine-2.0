name: Build and Package Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-package-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Install Visual C++ Redistributable
        run: choco install vcredist-all -y

      - name: Setup DirectX Software Rendering
        run: |
          setx DIRECT3D_DEVICE WARP
    
      - name: Enable graphics for compilers
        run: |
          # Ensure DirectX is available
          Get-WindowsCapability -Online | Where-Object {$_.Name -like "*Graphics*"} | Add-WindowsCapability -Online  
          
      # 1. Compile your engine/game (Example using CMake)
      - name: Configure with CMake
        run: cmake -S kOS -B kOS/build
        shell: powershell
        
      - name: Build (Release)
        run: cmake --build kOS/build --config Release -- /m
        shell: powershell

      # 1.5 Compile Assets to Resource Folder
      - name: Compile Assets via KosEngine
        working-directory: .\kOS\bin\Release
        run: .\Kos_Editor.exe --pack-assets
        shell: cmd
        

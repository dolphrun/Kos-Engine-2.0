name: Build and Package Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  
permissions:
  contents: write  # This allows the token to create tags and releases
  
jobs:
  build-and-package-windows:
    #runs-on: self-hosted
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      # 1. Compile your engine/game (Example using CMake)
      - name: Configure with CMake
        run: cmake -S kOS -B kOS/build
        shell: powershell
        
      - name: Build (Release)
        run: cmake --build kOS/build --config Release -- /m
        shell: powershell

      # 1.5 Compile Assets to Resource Folder
      - name: Compile Assets via KosEngine
        working-directory: .\kOS\bin\Release
        continue-on-error: true
        run: .\Kos_Editor.exe --pack-assets
        shell: cmd

        # 2. Populate the GAMEDIRECTORY
      - name: Prepare Game Directory
        shell: powershell
        run: |
          # 1. Create all the destination directories first, so PowerShell doesn't panic
          New-Item -ItemType Directory -Force -Path "Installer\GAMEDIRECTORY\bin\Release"
          New-Item -ItemType Directory -Force -Path "Installer\GAMEDIRECTORY\Resource"
          New-Item -ItemType Directory -Force -Path "Installer\GAMEDIRECTORY\Engine\Physics"
          New-Item -ItemType Directory -Force -Path "Installer\GAMEDIRECTORY\Alchemication\Configs"
          
          # 2. Copy compiled binaries (-Recurse is used for folders)
          Copy-Item -Path "kOS\bin\Release\*" -Destination "Installer\GAMEDIRECTORY\bin\Release\" -Recurse -Force
          
          # 3. Copy Resource folder contents
          Copy-Item -Path "kOS\Resource\*" -Destination "Installer\GAMEDIRECTORY\Resource\" -Recurse -Force

          # 4. Copy specific single files (No Recurse needed)
          Copy-Item -Path "kOS\Engine\Physics\Layer.json" -Destination "Installer\GAMEDIRECTORY\Engine\Physics\" -Force
          Copy-Item -Path "kOS\Alchemication\Configs\Config.json" -Destination "Installer\GAMEDIRECTORY\Alchemication\Configs\" -Force
          Copy-Item -Path "kOS\Alchemication\Configs\icon.png" -Destination "Installer\GAMEDIRECTORY\Alchemication\Configs\" -Force

      # 3. Run Inno Setup to generate the installer
      - name: Compile Inno Setup Script
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: Installer\InstallScript.iss

      # 4. Upload the final installer
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: Installer/INSTALLER/Alchemication_Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
      # 5. Debugging Step (Triggers ONLY if a step above this one fails)
      - name: Setup tmate session for debugging
        uses: mxschmitt/action-tmate@v3
        if: failure()
